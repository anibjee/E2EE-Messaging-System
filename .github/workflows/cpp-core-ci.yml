name: C++ Core CI

on:
  push:
    branches: [ main ]
    paths:
      - 'cpp-core/**'
      - 'frontend-monorepo/cpp/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'cpp-core/**'
      - 'frontend-monorepo/cpp/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Configure CMake
        run: cmake -B build -S .
        # Note: Adjust the source path (-S .) if the C++ code is in a specific subdirectory

      - name: Build
        run: cmake --build build
