name: C++ Crypto Core CI

on:
  push:
    paths:
      - 'frontend-monorepo/apps/expo/android/app/src/main/cpp/**'
  pull_request:
    paths:
      - 'frontend-monorepo/apps/expo/android/app/src/main/cpp/**'

jobs:
  compile-native:
    name: Compile C++ HAL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.22.x'

      # We will point this to your CMakeLists.txt once you create it
      - name: Configure CMake
        run: |
          mkdir -p build
