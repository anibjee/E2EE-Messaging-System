name: Java Backend CI

on:
  push:
    paths:
      - 'backend-java/**'
  pull_request:
    paths:
      - 'backend-java/**'

jobs:
  build-and-test:
    name: Spring Boot Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend-java

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # NEW: Grant execution rights to the wrapper
      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      # NEW: Use the wrapper instead of global maven
      - name: Build and Test with Maven Wrapper
        run: ./mvnw clean verify