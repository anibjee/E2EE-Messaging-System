name: Java Backend CI

on:
  push:
    paths:
      - 'backend-java/**'
  pull_request:
    paths:
      - 'backend-java/**'

jobs:
  build-and-test:
    name: Spring Boot Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend-java

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' # Standard enterprise distribution
          cache: 'maven'

      # This command compiles the code and runs all JUnit tests
      - name: Build and Test with Maven
        run: mvn clean verify
