name: Frontend Monorepo CI

# Only run this if files inside the frontend folder change
on:
  push:
    paths:
      - 'frontend-monorepo/**'
  pull_request:
    paths:
      - 'frontend-monorepo/**'

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend-monorepo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend-monorepo/package-lock.json

      - name: Install Dependencies
        run: npm ci

      # For now, we just ensure it builds for the web without crashing
      - name: Build Web Export
        run: npm run build
